name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          
      - name: Install dependencies
        run: |
          cd backend
          uv sync
          
      - name: Run backend tests
        run: |
          cd backend
          uv run pytest tests/ -v
          
      - name: Run linting
        run: |
          cd backend
          uv run ruff check src/
          uv run black --check src/
          uv run isort --check src/

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          
      - name: Run frontend build
        run: |
          cd frontend
          pnpm build
          
      - name: Run linting
        run: |
          cd frontend
          pnpm lint
